parameters:
    gemini_model: 'gemini-2.5-flash'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\GeminiChatService:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'
            $geminiModel: '%env(default:gemini_model:GEMINI_MODEL)%'

    App\Service\GeminiCommandPlannerService:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'
            $geminiModel: '%env(default:gemini_model:GEMINI_MODEL)%'

    App\Service\GmailService:
        arguments:
            $googleClientId: '%env(GOOGLE_CLIENT_ID)%'
            $googleClientSecret: '%env(GOOGLE_CLIENT_SECRET)%'
            $googleRedirectUri: '%env(GOOGLE_REDIRECT_URI)%'