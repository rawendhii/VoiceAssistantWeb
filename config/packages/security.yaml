security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            custom_authenticator: App\Security\LoginFormAuthenticator

            webauthn:
                secured_rp_ids:
                    - 'localhost'
                authentication:
                    routes:
                        options_path: '/passkey/login/options'
                        result_path: '/passkey/login'

            logout:
                path: app_logout
                target: app_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        - { path: ^/passkey/login, roles: PUBLIC_ACCESS }
        - { path: ^/camera-login, roles: PUBLIC_ACCESS }
        - { path: ^/front/profile/passkey, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/front/profile/camera-login, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/front, roles: ROLE_USER }
        - { path: ^/voice, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10